---
lints:
  - atom-is-not-unique
asserts:
  - /defects[count(defect[@severity='error'])=2]
  - /defects/defect[@object='single' and @line='5']
  - /defects/defect[@object='single' and @line='3']
  - /defects/defect[1][normalize-space()='Atom with FQN "Ф.single.foo" is duplicated, original was found in "single"']
  - /defects/defect[2][normalize-space()='Atom with FQN "Ф.single.foo" is duplicated, original was found in "single"']
single.eo: |
  # Singe object with atom FQN duplicates.
  [attrs] > single
    [] > foo ?
    [] > @
    [] > foo ?
